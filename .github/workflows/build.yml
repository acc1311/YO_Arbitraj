name: Build EXE & Release

on:
  push:
    branches: [ master, main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  test:
    name: Teste Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configurare Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Rulare teste
        run: python -m pytest tests/test_core.py -v

  build-exe:
    name: Build EXE Windows
    runs-on: windows-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Configurare Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x64'
      - name: Instalare PyInstaller
        run: pip install pyinstaller
      - name: Build EXE
        run: pyinstaller build/build.spec --distpath dist --workpath build/work --noconfirm
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: YO_Arbitraj_v1.0_Windows_x64
          path: dist/YO_Arbitraj_v1.0.exe
          retention-days: 30

  release:
    name: Release GitHub
    runs-on: ubuntu-latest
    needs: build-exe
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Descarca artifact
        uses: actions/download-artifact@v4
        with:
          name: YO_Arbitraj_v1.0_Windows_x64
          path: dist/
      - name: Creare Release
        uses: softprops/action-gh-release@v2
        with:
          name: "YO Arbitraj ${{ github.ref_name }}"
          body: |
            ## YO Arbitraj ${{ github.ref_name }}
            Arbitraj profesional pentru concursuri radioamatori YO
            Developed by: Ardei Constantin-Catalin (YO8ACR) — yo8acr@gmail.com

            ### Descarcare
            **YO_Arbitraj_v1.0.exe** — Windows standalone, nu necesita Python instalat

            ### Concursuri: Maraton | Stafeta | YO DX HF | YO VHF | Field Day | Sprint
            ### Import: ADIF | Cabrillo 2.0/3.0 | CSV | JSON

            73 de YO8ACR!
          files: dist/YO_Arbitraj_v1.0.exe
          draft: false
          prerelease: false
